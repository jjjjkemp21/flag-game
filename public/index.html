<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FFF7EC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F0E1E" media="(prefers-color-scheme: dark)" />

    <!-- Primary SEO -->
    <title>Flag Game – Free Quiz to Learn the Flags of the World</title>
    <meta
      name="description"
      content="Learn the flags of every country with Flag Game — a free, playful quiz. Master 250+ world flags with spaced repetition, frenzy challenges, pixel reveals, language rounds, and live multiplayer races."
    />
    <meta
      name="keywords"
      content="flag game, flag quiz, learn world flags, country flags quiz, flags of the world, guess the flag, geography quiz, flag learning game, world flags trivia, spaced repetition flags, multiplayer flag game"
    />
    <meta name="author" content="Flag Game" />
    <meta name="application-name" content="Flag Game" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://flag-game.org/" />

    <!-- Open Graph (Facebook, iMessage, Discord, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Flag Game" />
    <meta property="og:title" content="Flag Game – Learn the Flags of the World" />
    <meta
      property="og:description"
      content="A free, playful quiz to master 250+ world flags — spaced repetition, frenzy challenges, language rounds, and live multiplayer races."
    />
    <meta property="og:url" content="https://flag-game.org/" />
    <meta property="og:image" content="https://flag-game.org/favicon.png" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Flag Game – Learn the Flags of the World" />
    <meta
      name="twitter:description"
      content="A free, playful quiz to master 250+ world flags — spaced repetition, frenzy challenges, and live multiplayer races."
    />
    <meta name="twitter:image" content="https://flag-game.org/favicon.png" />

    <!-- Structured data: helps Google understand the app -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Flag Game",
        "alternateName": "Flag Game – Learn World Flags",
        "url": "https://flag-game.org/",
        "description": "A free, playful quiz to learn the flags of every country, with spaced repetition, frenzy challenges, pixel reveals, language rounds, and live multiplayer races.",
        "applicationCategory": "EducationalApplication",
        "applicationSubCategory": "Geography Quiz Game",
        "operatingSystem": "Any modern web browser",
        "browserRequirements": "Requires JavaScript.",
        "inLanguage": "en",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=swap"
    />
  </head>
  <body>
    <noscript>
      <h1>Flag Game — Learn the Flags of the World</h1>
      <p>
        Flag Game is a free, playful quiz for learning the flags of every country.
        Master 250+ world flags with spaced repetition, race the clock in Frenzy
        mode, guess pixelated flags, match phrases to languages, and challenge
        friends in live multiplayer. Flag Game needs JavaScript enabled to play —
        please turn it on and reload.
      </p>
    </noscript>
    <div id="root"></div>
  </body>
</html>
