    <meta name="theme-color" content="#FFF7EC" media="(prefers-color-scheme: light)" />

    <!-- Apply the saved theme before first paint to avoid a light flash. Dark
         is the default when no preference has been saved (matches App.js). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <!-- Primary SEO -->

    />
